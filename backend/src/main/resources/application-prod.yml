spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    org.springframework.security: INFO

management:
  endpoints:
    web:
      base-path: /actuator
