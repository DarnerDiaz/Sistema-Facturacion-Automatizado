services:
  mysql:
    image: mysql:8.4
    container_name: facturacion-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-facturacion_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: facturacion-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facturacion-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-facturacion_db}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-change_me_please_change_me_please_change_me_please}
      JWT_ACCESS_EXP_MIN: ${JWT_ACCESS_EXP_MIN:-30}
      JWT_REFRESH_EXP_DAYS: ${JWT_REFRESH_EXP_DAYS:-7}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@facturacion.local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facturacion-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:8080"

volumes:
  mysql_data:
